<html> 
    <head> 
        <title>HandOff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="mainstyle.css">

    </head>

    <body> 

        <div id="handles"> 
           <a href="aboutPage/about.html">About</a>
           <a href="logs.html">View Progress</a>
           <a href="#">Learn More</a>

        </div>

        <div style="display:flex; flex-direction: row; justify-content: center;">


       <div style="display:flex; flex-direction: column;gap:20px">
        <div class="timer-box">
            <h1 id="timer"><span id="minutes">60</span>:<span id="seconds">00</span></h1>
            <button id="session-button">Start Session</button>
        </div>

        <div id="previous-summary"> 
            <p>Previous Note</p>
        </div>

        <div id="show-on-completion"> 

            <p id="congrats-message">Congrats on completing your session!</p>

            <img src="https://i.pinimg.com/originals/1d/ea/fb/1deafb64c0c0c1c64700548be28c1a0f.gif">

            <p>What did you accomplish this session (Seperate By Commas)</p>
            <textarea id="accomplished" placeholder="I accomplished..."></textarea>

            <p>What are next steps? (Seperate By Commas)</p>
            <textarea id="next-steps" placeholder="Next session I want to complete..."></textarea>

            <button id="submit-session-summary">Submit</button>

            <script> 
                //defined variables
                const submission_button=document.querySelector("#submit-session-summary"); 
                const completion_page=document.querySelector("#show-on-completion")


                //get form information
                const tasks_completed=document.querySelector("#accomplished");
                const new_tasks=document.querySelector("#next-steps");

              


                
                submission_button.addEventListener("click", ()=>{
                    console.log("Submitted Log")
                    completion_page.style.display="none";

                    //debugging statements 
                    console.log(tasks_completed.value); 
                    console.log(new_tasks.value);


                })
            </script>

        </div>

        </div>

        </div>




        <footer style="margin-top:100vh"> 
            <p>Read More About It: <a href="https://medium.com/@cognnitivechats/have-you-ever-noticed-that-beginning-a-task-feels-exciting-but-keeping-up-momentum-is-harder-43646321f731"</a>
            Why Starting Is Psychologically Easier Than Continuing (Medium) </p>
        </footer>



        <script src="mainjs.js"></script>

    </body>




</html>
