<html> 
    <head> 
        <title>HandOff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


        <style> 

        * {
            font-family:"Outfit";
            font-weight: 400;
        }
         #timer{
            font-size:150px;
            margin-bottom:10px;
        }

        button {
            cursor: pointer;
            width:70%;
        
        }

        button:hover{
            background-color: yellow;
        }

         #session-button{
            padding:10px 20px; 
            border:none;
            border-radius:16px;
         }

         .timer-box {
            display:flex; 
            flex-direction: column;
            align-items: center;
         }

         body {
            padding:50px;
         }

         #handles{
            display:flex; 
            flex-direction: row;
            gap:20px;
        
         }

         #handles a{
            text-decoration: none;
            color:black;
         }
            

        </style>

    </head>

    <body> 

        <div id="handles"> 
           <a href="#">View Progress</a>
           <a href="#">Learn More</a>

        </div>

        <div style="display:flex; flex-direction: row; justify-content: center;">


       <div style="display:flex; flex-direction: column;gap:20px">
        <div class="timer-box">
            <h1 id="timer"><span id="hour">1</span>:<span id="minutes">00</span></h1>
            <button id="session-button">Start Session</button>
        </div>

        <div id="previous-summary"> 
            <p>Previous Note</p>
        </div>

        </div>

        </div>




        <footer style="margin-top:100vh"> 
            <p>Read More About It: <a href="https://medium.com/@cognnitivechats/have-you-ever-noticed-that-beginning-a-task-feels-exciting-but-keeping-up-momentum-is-harder-43646321f731"</a>
            Why Starting Is Psychologically Easier Than Continuing (Medium) </p>
        </footer>

    </body>


    <script>

        async function run_timer(){
            return ""; 
        }

        const sb=document.getElementById("session-button"); 
        sb.addEventListener("click", ()=>{
           run_timer()
           console.log("Starting Timer...")
        })
    </script>


</html>
