<html> 
    <head> 
        <title>HandOff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


        <style> 

        * {
            font-family:"Outfit";
            font-weight: 400;
        }
         #timer{
            font-size:150px;
            margin-bottom:10px;
        }

        button {
            cursor: pointer;
            width:70%;
        
        }

        button:hover{
            background-color: yellow;
        }

        button{
            padding:10px 20px; 
            border:none;
            border-radius:16px;
            font-size:15px;
            margin-top:20px;
         }

         .timer-box {
            display:flex; 
            flex-direction: column;
            align-items: center;
         }

         body {
            padding:50px;
         }

         #handles{
            display:flex; 
            flex-direction: row;
            gap:50px;
            align-items: center;
        
         }

         #handles a, #handles p{
            text-decoration: none;
            color:black;
            background-color: yellow;
            padding:5px 15px;
         }

         textarea{
            width:100%;
            height:80px;
            padding:10px;
        }


        #show-on-completion{
            background-color: yellow;
            padding:20px;
            border-radius: 20px;
            border-radius:20px;
            display:flex; 
            flex-direction: column;
            align-items:center;
        }

        img {
            width:50%;
            margin-top:10px;
        }

        #congrats-message{
            font-size:35px;
            margin-bottom:10px;
        }
            

        </style>

    </head>

    <body> 

        <div id="handles"> 
           <a href="">HANDOFF-WEB</a>
           <a href="logs.html">VIEW PROGRESS</a>
           <a href="#">LEARN MORE</a>

        </div>

        <div style="display:flex; flex-direction: row; justify-content: center;">


       <div style="display:flex; flex-direction: column;gap:20px">
        <div class="timer-box">
            <h1 id="timer"><span id="hour">1</span>:<span id="minutes">00</span></h1>
            <button id="session-button">Start Session</button>
        </div>

        <div id="previous-summary"> 
            <p>Previous Note</p>
        </div>

        <div id="show-on-completion"> 

            <p id="congrats-message">Congrats on completing your session!</p>

            <img src="https://i.pinimg.com/originals/1d/ea/fb/1deafb64c0c0c1c64700548be28c1a0f.gif">

            <p>What did you accomplish this session?</p>
            <textarea id="accomplished" placeholder="I accomplished..."></textarea>

            <p>What should you complete next session?</p>
            <textarea id="next-steps" placeholder="Next session I want to complete..."></textarea>

            <button>Submit</button>

        </div>

        </div>

        </div>




        <footer style="margin-top:100vh"> 
            <p>Read More About It: <a href="https://medium.com/@cognnitivechats/have-you-ever-noticed-that-beginning-a-task-feels-exciting-but-keeping-up-momentum-is-harder-43646321f731"</a>
            Why Starting Is Psychologically Easier Than Continuing (Medium) </p>
        </footer>

    </body>

        }

        function finished_session(){

        }

        const sb=document.getElementById("session-button"); 
        sb.addEventListener("click", ()=>{
           run_timer()
           console.log("Starting Timer...")
        })
    </script>


</html>
